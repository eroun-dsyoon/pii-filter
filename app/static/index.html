<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PII Filter - 개인정보 필터링 서비스</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🔒 PII Filter</div>
        <div class="nav-links">
            <a href="/" class="active">검출</a>
            <a href="/admin">관리자</a>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h1>개인정보 필터링 서비스</h1>
            <p>텍스트 또는 파일에서 개인정보를 검출합니다. 우회 시도(대체 문자, 다양한 구분자)도 탐지합니다.</p>
        </section>

        <section class="detect-section">
            <div class="input-group">
                <div class="tabs">
                    <button class="tab active" data-tab="text">텍스트 입력</button>
                    <button class="tab" data-tab="file">파일 업로드</button>
                </div>

                <div id="tab-text" class="tab-content active">
                    <textarea id="input-text" placeholder="검사할 텍스트를 입력하세요...&#10;&#10;예시:&#10;- 주민등록번호: 900101-1234567&#10;- 전화번호: 010-1234-5678&#10;- 이메일: test@example.com" rows="8"></textarea>
                </div>

                <div id="tab-file" class="tab-content">
                    <div class="file-upload">
                        <input type="file" id="input-file" accept=".txt,.csv,.json,.log">
                        <label for="input-file">파일을 선택하세요 (txt, csv, json, log)</label>
                        <span id="file-name"></span>
                    </div>
                </div>

                <div class="controls">
                    <div class="level-selector">
                        <label>검출 레벨:</label>
                        <select id="detect-level">
                            <option value="1">1단계 - 기본 형식</option>
                            <option value="2">2단계 - 다양한 구분자</option>
                            <option value="3" selected>3단계 - 대체 문자 포함</option>
                        </select>
                    </div>
                    <button id="btn-detect" class="btn-primary">검출 시작</button>
                </div>
            </div>

            <div id="results" class="results hidden">
                <div class="results-header">
                    <h2>검출 결과</h2>
                    <div class="results-meta">
                        <span id="result-count"></span>
                        <span id="result-time"></span>
                    </div>
                </div>

                <div id="result-status" class="status-badge"></div>

                <div id="entity-list" class="entity-list"></div>
            </div>
        </section>

        <!-- 오탐 신고 모달 -->
        <div id="fp-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>오탐 신고</h3>
                    <button class="modal-close" onclick="closeFPModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <p>이 검출 결과가 오탐(False Positive)이라고 생각하시면 신고해주세요.</p>
                    <div class="form-group">
                        <label>검출된 엔티티:</label>
                        <input id="fp-entity" type="text" readonly>
                    </div>
                    <div class="form-group">
                        <label>엔티티 타입:</label>
                        <input id="fp-type" type="text" readonly>
                    </div>
                    <div class="form-group">
                        <label>오탐 사유:</label>
                        <textarea id="fp-reason" rows="3" placeholder="왜 이것이 개인정보가 아닌지 설명해주세요..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="closeFPModal()">취소</button>
                    <button class="btn-primary" onclick="submitFPReport()">신고</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 탭 전환
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // 파일 선택 표시
        document.getElementById('input-file').addEventListener('change', (e) => {
            document.getElementById('file-name').textContent = e.target.files[0]?.name || '';
        });

        // 검출 실행
        document.getElementById('btn-detect').addEventListener('click', async () => {
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            const level = parseInt(document.getElementById('detect-level').value);
            const btn = document.getElementById('btn-detect');

            btn.disabled = true;
            btn.textContent = '검출 중...';

            try {
                let response;
                if (activeTab === 'text') {
                    const text = document.getElementById('input-text').value;
                    if (!text.trim()) { alert('텍스트를 입력하세요.'); return; }
                    response = await fetch('/api/detect', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, level }),
                    });
                } else {
                    const file = document.getElementById('input-file').files[0];
                    if (!file) { alert('파일을 선택하세요.'); return; }
                    const formData = new FormData();
                    formData.append('file', file);
                    response = await fetch(`/api/detect/file?level=${level}`, {
                        method: 'POST',
                        body: formData,
                    });
                }

                const data = await response.json();
                displayResults(data);
            } catch (err) {
                alert('오류 발생: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '검출 시작';
            }
        });

        let currentText = '';

        function displayResults(data) {
            const results = document.getElementById('results');
            results.classList.remove('hidden');

            currentText = document.getElementById('input-text').value;

            document.getElementById('result-count').textContent =
                `${data.entities.length}개 검출`;
            document.getElementById('result-time').textContent =
                `${data.elapsed_ms.toFixed(3)}ms (${data.text_length}자)`;

            const status = document.getElementById('result-status');
            if (data.has_pii) {
                status.className = 'status-badge danger';
                status.textContent = '⚠️ 개인정보가 검출되었습니다';
            } else {
                status.className = 'status-badge safe';
                status.textContent = '✅ 개인정보가 검출되지 않았습니다';
            }

            const list = document.getElementById('entity-list');
            list.innerHTML = '';

            const typeLabels = {
                'RRN': '주민등록번호', 'CRN': '사업자등록번호', 'PHONE': '전화번호',
                'PASSPORT': '여권번호', 'BANK_ACCOUNT': '계좌번호', 'CREDIT_CARD': '신용카드',
                'DRIVER_LICENSE': '운전면허번호', 'EMAIL': '이메일',
            };

            data.entities.forEach((entity, i) => {
                const card = document.createElement('div');
                card.className = 'entity-card';
                card.innerHTML = `
                    <div class="entity-header">
                        <span class="entity-type">${typeLabels[entity.type] || entity.type}</span>
                        <span class="entity-level">Level ${entity.level}</span>
                        <button class="btn-report" onclick="openFPModal('${entity.entity.replace(/'/g, "\\'")}', '${entity.type}')">오탐 신고</button>
                    </div>
                    <div class="entity-value">${escapeHtml(entity.entity)}</div>
                    ${entity.normalized ? `<div class="entity-normalized">정규화: ${escapeHtml(entity.normalized)}</div>` : ''}
                    <div class="entity-position">위치: ${entity.start}-${entity.end}</div>
                `;
                list.appendChild(card);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 오탐 신고 모달
        function openFPModal(entity, type) {
            document.getElementById('fp-entity').value = entity;
            document.getElementById('fp-type').value = type;
            document.getElementById('fp-reason').value = '';
            document.getElementById('fp-modal').classList.remove('hidden');
        }

        function closeFPModal() {
            document.getElementById('fp-modal').classList.add('hidden');
        }

        async function submitFPReport() {
            const report = {
                text: currentText,
                entity: document.getElementById('fp-entity').value,
                entity_type: document.getElementById('fp-type').value,
                reason: document.getElementById('fp-reason').value,
            };

            try {
                const res = await fetch('/api/report/false-positive', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(report),
                });
                const data = await res.json();
                alert(`오탐 신고가 접수되었습니다. (ID: ${data.id})`);
                closeFPModal();
            } catch (err) {
                alert('신고 중 오류 발생: ' + err.message);
            }
        }
    </script>
</body>
</html>
