<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PII Filter - 관리자</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🔒 PII Filter</div>
        <div class="nav-links">
            <a href="/">검출</a>
            <a href="/admin" class="active">관리자</a>
        </div>
    </nav>

    <main class="container">
        <h1>관리자 페이지</h1>

        <!-- 합성 데이터 생성 -->
        <section class="admin-section">
            <h2>합성 데이터 생성 및 모델 개선</h2>
            <div class="pipeline-flow">
                <div class="flow-step"><span class="flow-icon">🔴</span><span>Red Team<br><small>합성 데이터 생성</small></span></div>
                <div class="flow-arrow">→</div>
                <div class="flow-step"><span class="flow-icon">🔵</span><span>Blue Team<br><small>1차 필터링</small></span></div>
                <div class="flow-arrow">→</div>
                <div class="flow-step"><span class="flow-icon">⚖️</span><span>Judge<br><small>오탐/미탐 분석</small></span></div>
                <div class="flow-arrow">→</div>
                <div class="flow-step"><span class="flow-icon">📈</span><span>개선<br><small>피드백 반영</small></span></div>
                <div class="flow-arrow">→</div>
                <div class="flow-step"><span class="flow-icon">✅</span><span>재평가<br><small>성능 비교</small></span></div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>생성할 데이터 수:</label>
                    <input type="number" id="gen-count" value="1000" min="1" max="100000">
                </div>
                <div class="form-group">
                    <label>타겟 검출 레벨:</label>
                    <select id="gen-level">
                        <option value="1">1단계</option>
                        <option value="2">2단계</option>
                        <option value="3" selected>3단계</option>
                    </select>
                </div>
                <button id="btn-generate" class="btn-primary" onclick="startGeneration()">파이프라인 실행</button>
            </div>

            <div id="pipeline-status" class="pipeline-status hidden">
                <div class="status-header">
                    <span id="pipeline-phase"></span>
                    <span id="pipeline-state" class="badge"></span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <p id="pipeline-message"></p>
                <div id="pipeline-metrics" class="metrics-grid hidden"></div>
            </div>
        </section>

        <!-- 개선 리포트 -->
        <section class="admin-section">
            <h2>개선 리포트</h2>
            <div id="reports-list" class="reports-list">
                <p class="loading">로딩 중...</p>
            </div>
        </section>

        <!-- 실행 이력 -->
        <section class="admin-section">
            <h2>실행 이력</h2>
            <div id="runs-list" class="runs-list">
                <p class="loading">로딩 중...</p>
            </div>
        </section>

        <!-- 합성 데이터 파일 -->
        <section class="admin-section">
            <h2>합성 데이터 파일</h2>
            <div id="data-files" class="data-files">
                <p class="loading">로딩 중...</p>
            </div>
        </section>

        <!-- 오탐 신고 목록 -->
        <section class="admin-section">
            <h2>오탐 신고 목록</h2>
            <div id="fp-list" class="fp-list">
                <p class="loading">로딩 중...</p>
            </div>
        </section>

        <!-- 리포트 상세 모달 -->
        <div id="report-modal" class="modal hidden">
            <div class="modal-content wide">
                <div class="modal-header">
                    <h3>리포트 상세</h3>
                    <button class="modal-close" onclick="closeReportModal()">&times;</button>
                </div>
                <div id="report-detail" class="modal-body"></div>
            </div>
        </div>
    </main>

    <script>
        let currentRunId = null;
        let pollInterval = null;

        async function startGeneration() {
            const count = parseInt(document.getElementById('gen-count').value);
            const level = parseInt(document.getElementById('gen-level').value);
            const btn = document.getElementById('btn-generate');
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count, level }),
                });
                const data = await res.json();
                currentRunId = data.run_id;

                document.getElementById('pipeline-status').classList.remove('hidden');
                updatePipelineStatus(data);
                pollInterval = setInterval(pollStatus, 1500);
            } catch (err) {
                alert('오류: ' + err.message);
                btn.disabled = false;
            }
        }

        async function pollStatus() {
            if (!currentRunId) return;
            try {
                const res = await fetch(`/api/admin/status/${currentRunId}`);
                const data = await res.json();
                updatePipelineStatus(data);

                if (data.status === 'completed' || data.status === 'failed') {
                    clearInterval(pollInterval);
                    document.getElementById('btn-generate').disabled = false;
                    loadAll();
                }
            } catch (err) { console.error(err); }
        }

        function updatePipelineStatus(data) {
            const phaseLabels = {
                'red_team': '🔴 Red Team - 합성 데이터 생성',
                'blue_team': '🔵 Blue Team - 필터링 수행',
                'judge': '⚖️ Judge - 오탐/미탐 분석',
                'improvement': '📈 알고리즘 개선',
                'done': '✅ 완료',
            };

            document.getElementById('pipeline-phase').textContent = phaseLabels[data.phase] || data.status;
            const stateEl = document.getElementById('pipeline-state');
            stateEl.textContent = data.status;
            stateEl.className = `badge ${data.status === 'completed' ? 'success' : data.status === 'failed' ? 'error' : 'running'}`;
            document.getElementById('pipeline-message').textContent = data.message;

            const pct = data.total > 0 ? (data.processed / data.total * 100) : 0;
            document.getElementById('progress-fill').style.width = (data.status === 'completed' ? 100 : Math.max(pct, 10)) + '%';

            if (data.metrics) {
                const m = data.metrics;
                const metricsDiv = document.getElementById('pipeline-metrics');
                metricsDiv.classList.remove('hidden');
                metricsDiv.innerHTML = `
                    <div class="metric"><span class="metric-label">Precision</span><span class="metric-value">${(m.precision * 100).toFixed(1)}%</span></div>
                    <div class="metric"><span class="metric-label">Recall</span><span class="metric-value">${(m.recall * 100).toFixed(1)}%</span></div>
                    <div class="metric"><span class="metric-label">F1 Score</span><span class="metric-value">${(m.f1_score * 100).toFixed(1)}%</span></div>
                    <div class="metric"><span class="metric-label">Accuracy</span><span class="metric-value">${(m.accuracy * 100).toFixed(1)}%</span></div>
                    <div class="metric"><span class="metric-label">FP (오탐)</span><span class="metric-value error">${m.false_positives}</span></div>
                    <div class="metric"><span class="metric-label">FN (미탐)</span><span class="metric-value error">${m.false_negatives}</span></div>
                `;
            }
        }

        async function loadReports() {
            try {
                const res = await fetch('/api/admin/reports');
                const reports = await res.json();
                const el = document.getElementById('reports-list');
                if (!reports.length) { el.innerHTML = '<p class="empty">리포트가 없습니다.</p>'; return; }
                el.innerHTML = reports.map(r => {
                    const b = r.before || {};
                    const a = r.after || {};
                    const fpDelta = (a.false_positives ?? 0) - (b.false_positives ?? 0);
                    const fnDelta = (a.false_negatives ?? 0) - (b.false_negatives ?? 0);
                    const f1Delta = ((a.f1_score ?? 0) - (b.f1_score ?? 0)) * 100;
                    return `
                    <div class="report-card" onclick="viewReport('${r.id}')">
                        <div class="report-header">
                            <span class="report-id">${r.id}</span>
                            <span class="report-date">${new Date(r.created_at).toLocaleString('ko-KR')}</span>
                        </div>
                        <div class="report-summary">
                            <div class="report-metric-row">
                                <span class="label">F1 Score</span>
                                <span>${((b.f1_score || 0) * 100).toFixed(1)}%</span>
                                <span class="arrow">→</span>
                                <span class="bold">${((a.f1_score || 0) * 100).toFixed(1)}%</span>
                                <span class="${f1Delta >= 0 ? 'positive' : 'negative'}">(${f1Delta >= 0 ? '+' : ''}${f1Delta.toFixed(1)}%)</span>
                            </div>
                            <div class="report-metric-row">
                                <span class="label">오탐(FP)</span>
                                <span>${b.false_positives ?? '?'}</span>
                                <span class="arrow">→</span>
                                <span class="bold">${a.false_positives ?? '?'}</span>
                                <span class="${fpDelta <= 0 ? 'positive' : 'negative'}">(${fpDelta >= 0 ? '+' : ''}${fpDelta})</span>
                            </div>
                            <div class="report-metric-row">
                                <span class="label">미탐(FN)</span>
                                <span>${b.false_negatives ?? '?'}</span>
                                <span class="arrow">→</span>
                                <span class="bold">${a.false_negatives ?? '?'}</span>
                                <span class="${fnDelta <= 0 ? 'positive' : 'negative'}">(${fnDelta >= 0 ? '+' : ''}${fnDelta})</span>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) { document.getElementById('reports-list').innerHTML = '<p class="error">로딩 실패</p>'; }
        }

        async function viewReport(id) {
            try {
                const res = await fetch(`/api/admin/reports/${id}`);
                const r = await res.json();
                const detail = document.getElementById('report-detail');

                detail.innerHTML = `
                    <h4>실행 정보</h4>
                    <p>ID: ${r.id} | 생성일: ${new Date(r.created_at).toLocaleString('ko-KR')} | 데이터: ${r.config.count}개 | 레벨: ${r.config.level}단계</p>

                    <h4>성능 변화 (Before → After)</h4>
                    <table class="data-table">
                        <thead><tr><th>지표</th><th>개선 전</th><th>개선 후</th><th>변화</th></tr></thead>
                        <tbody>${(r.metric_changes || r.improvements || []).map(i => `
                            <tr>
                                <td class="bold">${i.metric}</td>
                                <td>${(i.before * 100).toFixed(2)}%</td>
                                <td class="bold">${(i.after * 100).toFixed(2)}%</td>
                                <td class="${i.delta >= 0 ? 'positive' : 'negative'}">${i.delta >= 0 ? '+' : ''}${(i.delta * 100).toFixed(2)}%</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>

                    ${r.error_analysis_before ? `
                    <h4>오탐(FP) 분석</h4>
                    <div class="error-comparison">
                        <div class="error-col">
                            <h5>개선 전 (${r.error_analysis_before.fp_count}건)</h5>
                            ${renderTypeDistribution(r.error_analysis_before.fp_by_type)}
                            ${renderSamples(r.error_analysis_before.fp_samples, 'fp')}
                        </div>
                        <div class="error-col">
                            <h5>개선 후 (${r.error_analysis_after.fp_count}건)</h5>
                            ${renderTypeDistribution(r.error_analysis_after.fp_by_type)}
                            ${renderSamples(r.error_analysis_after.fp_samples, 'fp')}
                        </div>
                    </div>

                    <h4>미탐(FN) 분석</h4>
                    <div class="error-comparison">
                        <div class="error-col">
                            <h5>개선 전 (${r.error_analysis_before.fn_count}건)</h5>
                            ${renderTypeDistribution(r.error_analysis_before.fn_by_type)}
                            ${renderSamples(r.error_analysis_before.fn_samples, 'fn')}
                        </div>
                        <div class="error-col">
                            <h5>개선 후 (${r.error_analysis_after.fn_count}건)</h5>
                            ${renderTypeDistribution(r.error_analysis_after.fn_by_type)}
                            ${renderSamples(r.error_analysis_after.fn_samples, 'fn')}
                        </div>
                    </div>` : ''}

                    ${r.judge_feedback ? `
                    <h4>Judge 피드백</h4>
                    <p>총 오류: ${r.judge_feedback.total_errors}건</p>
                    ${r.judge_feedback.suggestions && r.judge_feedback.suggestions.length > 0 ? `
                    <ul>${r.judge_feedback.suggestions.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul>` : '<p class="muted">제안 없음</p>'}` : ''}

                    ${r.improvement_log && r.improvement_log.length > 0 ? `
                    <h4>개선 로그</h4>
                    ${r.improvement_log.map(l => `
                        <div class="log-entry">
                            <div class="log-header">
                                <span class="log-time">${l.timestamp ? new Date(l.timestamp).toLocaleTimeString('ko-KR') : ''}</span>
                                <span class="badge ${l.type === 'false_positive' ? 'error' : 'running'}">${l.type === 'false_positive' ? '오탐 개선' : '미탐 개선'}</span>
                            </div>
                            <p>${escapeHtml(l.description || '')}</p>
                            ${l.actions && l.actions.length > 0 ? `<ul class="action-list">${l.actions.map(a => `<li>${escapeHtml(a)}</li>`).join('')}</ul>` : ''}
                            ${l.missed_samples && l.missed_samples.length > 0 ? `
                            <details><summary>미탐 샘플 (${l.missed_samples.length}건)</summary>
                                <div class="sample-list">${l.missed_samples.map(s => `<div class="sample-item">${escapeHtml(typeof s === 'string' ? s : s.text || JSON.stringify(s))}</div>`).join('')}</div>
                            </details>` : ''}
                        </div>
                    `).join('')}` : ''}
                `;

                document.getElementById('report-modal').classList.remove('hidden');
            } catch (err) { alert('리포트 로딩 실패: ' + err.message); }
        }

        function renderTypeDistribution(dist) {
            if (!dist || Object.keys(dist).length === 0) return '<p class="muted">해당 없음</p>';
            return `<div class="type-dist">${Object.entries(dist).map(([type, count]) =>
                `<span class="type-tag">${type}: ${count}건</span>`
            ).join('')}</div>`;
        }

        function renderSamples(samples, kind) {
            if (!samples || samples.length === 0) return '';
            return `<details><summary>샘플 ${samples.length}건</summary>
                <div class="sample-list">${samples.map(s => {
                    if (kind === 'fp') {
                        return `<div class="sample-item">
                            <span class="sample-text">${escapeHtml(s.text || '')}</span>
                            <span class="sample-detected">${(s.detected || []).map(d => d.type).join(', ')}</span>
                        </div>`;
                    } else {
                        return `<div class="sample-item">
                            <span class="sample-text">${escapeHtml(s.text || '')}</span>
                            <span class="sample-expected">기대: ${s.expected_type || '?'}</span>
                        </div>`;
                    }
                }).join('')}</div>
            </details>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeReportModal() { document.getElementById('report-modal').classList.add('hidden'); }

        async function loadRuns() {
            try {
                const res = await fetch('/api/admin/runs');
                const runs = await res.json();
                const el = document.getElementById('runs-list');
                if (!runs.length) { el.innerHTML = '<p class="empty">실행 이력이 없습니다.</p>'; return; }
                el.innerHTML = runs.map(r => `
                    <div class="run-card">
                        <div class="run-header">
                            <span class="run-id">${r.run_id}</span>
                            <span class="badge ${r.status === 'completed' ? 'success' : r.status === 'failed' ? 'error' : 'running'}">${r.status}</span>
                        </div>
                        <p class="run-message">${escapeHtml(r.message)}</p>
                    </div>
                `).join('');
            } catch (err) { document.getElementById('runs-list').innerHTML = '<p class="error">로딩 실패</p>'; }
        }

        async function loadDataFiles() {
            try {
                const res = await fetch('/api/admin/synthetic-data');
                const files = await res.json();
                const el = document.getElementById('data-files');
                if (!files.length) { el.innerHTML = '<p class="empty">합성 데이터 파일이 없습니다.</p>'; return; }
                el.innerHTML = `<table class="data-table">
                    <thead><tr><th>파일명</th><th>데이터 수</th><th>크기</th><th>생성일</th></tr></thead>
                    <tbody>${files.map(f => `<tr><td>${f.filename}</td><td>${f.count.toLocaleString()}개</td><td>${f.size_kb} KB</td><td>${new Date(f.created_at).toLocaleString('ko-KR')}</td></tr>`).join('')}</tbody>
                </table>`;
            } catch (err) { document.getElementById('data-files').innerHTML = '<p class="error">로딩 실패</p>'; }
        }

        async function loadFPReports() {
            try {
                const res = await fetch('/api/report/false-positives');
                const reports = await res.json();
                const el = document.getElementById('fp-list');
                if (!reports.length) { el.innerHTML = '<p class="empty">오탐 신고가 없습니다.</p>'; return; }
                el.innerHTML = `<table class="data-table">
                    <thead><tr><th>ID</th><th>엔티티</th><th>타입</th><th>사유</th><th>상태</th><th>날짜</th></tr></thead>
                    <tbody>${reports.map(r => `<tr><td>${r.id}</td><td>${escapeHtml(r.entity)}</td><td>${r.entity_type}</td><td>${escapeHtml(r.reason || '-')}</td><td><span class="badge">${r.status}</span></td><td>${new Date(r.created_at).toLocaleString('ko-KR')}</td></tr>`).join('')}</tbody>
                </table>`;
            } catch (err) { document.getElementById('fp-list').innerHTML = '<p class="error">로딩 실패</p>'; }
        }

        function loadAll() { loadRuns(); loadReports(); loadDataFiles(); loadFPReports(); }
        loadAll();
    </script>
</body>
</html>
